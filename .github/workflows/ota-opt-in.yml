name: OTA Opt-In

# Propagated to opted-in forks via the standalone template profile.
#
# Fork owners run this workflow_dispatch once to:
#   1. Create .ota/config.yml in their fork (pre-populated with defaults)
#   2. Open a registration PR against fork-sync-all/config/ota-registry.yml
#
# After running this workflow, the fork will:
#   - Appear in fork-sync-all's registry (once the PR is merged or discovered)
#   - Receive OTA updates via ota-self-update.yml on a schedule
#   - Receive OTA delivery PRs from fork-sync-all on each new release

on:
  workflow_dispatch:
    inputs:
      contact:
        description: "Your GitHub username (for PR notifications)"
        required: false
        default: ""
        type: string
      upstream_override:
        description: "Override upstream source (owner/repo). Leave blank to use fork parent."
        required: false
        default: ""
        type: string
      auto_merge:
        description: "Auto-merge OTA PRs when checks pass"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ota-opt-in
  cancel-in-progress: false

jobs:
  opt-in:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve upstream repo
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN || secrets.GH_TOKEN || github.token }}
          UPSTREAM_OVERRIDE: ${{ inputs.upstream_override }}
        run: |
          # Resolution order:
          #   1. upstream_override input (explicit)
          #   2. GitHub fork parent API field (auto-detected)
          #   3. Fallback: Interested-Deving-1896/fork-sync-all
          if [[ -n "${UPSTREAM_OVERRIDE}" ]]; then
            echo "upstream_repo=${UPSTREAM_OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Upstream from input override: ${UPSTREAM_OVERRIDE}"
            exit 0
          fi

          parent=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}" 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('parent',{}).get('full_name',''))" \
            2>/dev/null || echo "")

          if [[ -n "$parent" ]]; then
            echo "upstream_repo=${parent}" >> "$GITHUB_OUTPUT"
            echo "Upstream from fork parent: ${parent}"
          else
            echo "upstream_repo=Interested-Deving-1896/fork-sync-all" >> "$GITHUB_OUTPUT"
            echo "Not a fork — falling back to Interested-Deving-1896/fork-sync-all"
          fi

      - name: Write .ota/config.yml
        env:
          CONTACT: ${{ inputs.contact }}
          AUTO_MERGE: ${{ inputs.auto_merge }}
          REPO: ${{ github.repository }}
          UPSTREAM_REPO: ${{ steps.upstream.outputs.upstream_repo }}
        run: |
          mkdir -p .ota

          TODAY=$(date -u +%Y-%m-%d)
          {
            printf '# .ota/config.yml - OTA update configuration for %s\n' "$REPO"
            printf '# Generated by ota-opt-in workflow on %s.\n' "$TODAY"
            printf '# See .ota/schema.yml in the upstream repo for full field documentation.\n'
            printf '\nenabled: true\n'
            printf 'repo: "%s"\n' "$REPO"
            printf 'host: github\n'
            printf 'upstream_override: "%s"\n' "$UPSTREAM_REPO"
            printf 'pinned_sha: ""\npinned_at: ""\nota_version: ""\nmirror_chain_opt_in: false\n'
            printf '\nworkflow_overrides:\n  claim: []\n  disclaim: []\n'
            printf '\nexclude_paths: []\ninclude_paths: []\n'
            printf '\ncontact: "%s"\n' "$CONTACT"
            printf '\nnotify:\n  pr: true\n  auto_merge: %s\n' "$AUTO_MERGE"
          } > .ota/config.yml

          echo "Created .ota/config.yml for ${REPO} (upstream: ${UPSTREAM_REPO})"

      - name: Commit .ota/config.yml
        env:
          UPSTREAM_REPO: ${{ steps.upstream.outputs.upstream_repo }}
        run: |
          git config user.name "ota-opt-in"
          git config user.email "ota@fork-sync-all"
          git add .ota/config.yml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m $'chore: opt in to OTA updates\n\nEnables OTA update delivery from upstream.\nCo-authored-by: Ona <no-reply@ona.com>'
          git push origin HEAD

      - name: Open registration issue against upstream
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN || secrets.GH_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          CONTACT: ${{ inputs.contact }}
          UPSTREAM_REPO: ${{ steps.upstream.outputs.upstream_repo }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)

          # Build the new registry entry
          NEW_ENTRY=$(printf '  - repo: "%s"\n    host: github\n    registered_at: "%s"\n    pinned_sha: ""\n    discovery: false\n    mirror_chain_opt_in: false\n    disabled: false' "$REPO" "$TODAY")

          printf '## OTA Opt-In Registration\n\n**Repo:** `%s`\n**Upstream:** `%s`\n**Contact:** %s\n**Date:** %s\n\nThe owner of `%s` has run the `ota-opt-in` workflow and opted in to OTA updates from `%s`.\n\n### Registry entry to add\n\n```yaml\n%s\n```\n\nMerging this PR adds the repo to `config/ota-registry.yml` so it receives OTA delivery PRs on each new release.\n\nTo reject this opt-in, close the PR without merging.' \
            "$REPO" "$UPSTREAM_REPO" "${CONTACT:-_not provided_}" "$TODAY" "$REPO" "$UPSTREAM_REPO" "$NEW_ENTRY" > /tmp/pr_body.txt

          # Open registration issue against upstream repo
          PAYLOAD=$(python3 -c "import json,sys; b=open('/tmp/pr_body.txt').read(); print(json.dumps({'title':'OTA opt-in: $REPO','body':b,'labels':['ota-registration']}))")
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${UPSTREAM_REPO}/issues" \
            -d "$PAYLOAD" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Registration issue opened:', d.get('html_url','unknown'))"
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
