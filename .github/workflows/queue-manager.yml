name: Queue Manager

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      stale_queue_min:
        description: "Minutes before a queued run is considered stale"
        required: false
        default: "25"
        type: string
      dry_run:
        description: "Report what would be cancelled without acting"
        required: false
        default: false
        type: boolean

concurrency:
  group: queue-manager
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  manage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "300"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/rate_limit" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])" \
            || echo 0)
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Quota too low (${remaining} < ${MIN_QUOTA}) — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Quota OK: ${remaining} remaining."
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/queue-manager.sh
            scripts/write-summary.sh
            scripts/includes/fsa-mode.sh
            config/workflow-priority-tiers.yml
          sparse-checkout-cone-mode: false

      - name: Check FSA mode
        id: fsa
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          FSA_MANAGED: ${{ vars.FSA_MANAGED }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          source scripts/includes/fsa-mode.sh
          if fsa_is_managed; then
            echo "managed=true" >> "$GITHUB_OUTPUT"
            echo "Managed by fork-sync-all — queue management handled centrally, skipping."
          else
            echo "managed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Manage queue
        if: steps.quota.outputs.skip == 'false' && steps.fsa.outputs.managed == 'false'
        id: manage
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          THIS_RUN_ID: ${{ github.run_id }}
          STALE_QUEUE_MIN: ${{ inputs.stale_queue_min || '25' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          MIN_QUOTA: "300"
        run: bash scripts/queue-manager.sh

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
